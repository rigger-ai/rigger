site_name: rigger
site_url: https://rigger-ai.github.io/rigger/
site_description: A declarative Python framework for building external harnesses around opaque coding agents
repo_url: https://github.com/rigger-ai/rigger
repo_name: rigger-ai/rigger

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - Built-in Components: built-in-components.md
  - Concepts: concepts.md
  - Guides:
    - Writing a Custom Backend: guides/custom-backend.md
    - Workspace Management: guides/workspace-management.md
  - API Reference: api/index.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
